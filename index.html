<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' https: data: blob:; connect-src 'self' https://*.arcgis.com https://arcgis.com https://*.arcgisonline.com https://geoservices.un.org http://localhost:3001 http://127.0.0.1:3001 ws://localhost:5173 ws://127.0.0.1:5173; img-src 'self' https: data: blob:; style-src 'self' 'unsafe-inline'; font-src 'self' https: data:; worker-src 'self' blob:; script-src 'self' blob: 'wasm-unsafe-eval';"
    />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <title>Weather Agent – ArcGIS 3D</title>
  </head>

  <body>
    <div class="app-shell" id="appShell">
      <div class="clock-shell">
        <div class="clock-widget" id="locationClock" aria-live="polite">
          <div class="clock-widget__face" aria-hidden="true">
            <span class="clock-widget__pin"></span>
            <span class="clock-widget__hand clock-widget__hand--hour" id="clockHourHand"></span>
            <span class="clock-widget__hand clock-widget__hand--minute" id="clockMinuteHand"></span>
          </div>

          <div class="clock-widget__meta">
            <div class="clock-widget__time" id="clockDigitalTime">--:--</div>
            <div class="clock-widget__timezone" id="clockTimezoneLabel">Browser time</div>
          </div>
        </div>
      </div>

      <div class="compass-shell">
        <arcgis-compass id="sceneCompass"></arcgis-compass>
      </div>

      <div class="basemap-switch-shell">
        <calcite-action
          id="basemapSwitchBtn"
          class="basemap-switch-btn"
          icon="basemap"
          text="Basemaps"
          scale="m"
          aria-expanded="false"
        ></calcite-action>

        <div id="basemapPopover" class="basemap-popover" hidden>
          <div class="basemap-menu-content">
            <div class="basemap-menu-title">Organization basemaps</div>
            <arcgis-basemap-gallery
              heading-level="3"
              label="Organization basemaps"
            ></arcgis-basemap-gallery>
          </div>
        </div>
      </div>

      <header class="app-header">
        <div class="app-brand">
          <h1 id="appTitle" class="app-title">Weather Agent</h1>
          <div id="appSubtitle" class="app-subtitle">ArcGIS Geospatial AI</div>
        </div>

        <div class="app-header__actions">
          <div class="user-menu-shell">
            <calcite-button
              id="userMenuButton"
              class="user-menu-button"
              appearance="outline-fill"
              kind="neutral"
              scale="m"
              icon-start="user"
              icon-end="caret-down"
              aria-expanded="false"
            >
              <span id="userMenuButtonLabel">ArcGIS account</span>
            </calcite-button>

            <div id="userMenuPopover" class="user-menu-popover" hidden>
              <div class="user-menu-card">
                <div class="user-menu-card__avatar" id="userAvatarCard">AG</div>
                <div class="user-menu-card__details">
                  <div id="userFullName" class="user-menu-card__name">Weather Agent</div>
                  <div id="userName" class="user-menu-card__username">ArcGIS account</div>
                </div>
              </div>

              <calcite-button
                id="signOutBtn"
                class="user-menu-action"
                width="full"
                appearance="outline"
                kind="neutral"
                icon-start="sign-out"
              >
                Sign out
              </calcite-button>
            </div>
          </div>
        </div>
      </header>

      <arcgis-scene id="mainScene" class="scene-host is-loading" aria-busy="true">
        <arcgis-daylight
          id="sceneDaylight"
          class="scene-daylight"
          hide-header
          hide-date-picker
          hide-play-buttons
          hide-shadows-toggle
          hide-sun-lighting-toggle
          hide-timezone
        ></arcgis-daylight>
      </arcgis-scene>
    </div>

    <div class="assistant-panel" id="assistantPanel">
      <div class="panel-tab" id="panelTab">
        <span class="panel-tab-title">
          <svg width="16" height="16" viewBox="0 0 32 32" fill="currentColor" aria-hidden="true">
            <path d="M28 4H4a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h6l6 6 6-6h6a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2Zm0 18H22.8L16 28.8 9.2 22H4V6h24Z"/>
          </svg>
          Weather Agent
        </span>
        <calcite-action
          class="panel-collapse-btn"
          id="collapseBtn"
          icon="minimize"
          text="Minimize panel"
          scale="s"
        ></calcite-action>
      </div>

      <div class="panel-body" id="panelBody">
        <div id="assistantMount"></div>
      </div>
    </div>

    <div class="assistant-launcher" id="assistantLauncher" hidden>
      <calcite-action
        id="assistantLaunchBtn"
        class="assistant-launch-btn"
        icon="speech-bubbles"
        text="Open assistant"
        scale="m"
      ></calcite-action>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
